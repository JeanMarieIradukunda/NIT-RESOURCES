<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>L5-NIT PYTHON ASSESSMENT</title>
    <style>
        body {
            font-family: Inter, "Segoe UI", Arial, sans-serif;
            background: #eef1f4;
            padding: 20px;
            margin: 0;
        }

        /* ===== Main Center Container ===== */
        .exam-wrapper {
            max-width: 900px;
            margin: auto;
        }

        /* ===== Header ===== */
        .header {
            background: #dde4eb;
            padding: 22px 26px;
            border-radius: 10px;
            margin-bottom: 22px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);

            font-family: Inter, "Segoe UI", Arial, sans-serif;

            /* layout control */
            text-align: left;
            max-width: 760px;
            margin-left: auto;
            margin-right: auto;
        }

        /* Main title */
        .header h2 {
            margin: 0 0 10px 0;
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 0.3px;
        }

        /* Detail rows */
        .header p {
            margin: 4px 0;
            font-size: 15px;
            font-weight: 500;
        }

        /* Optional: make labels align perfectly */
        .header p strong {
            display: inline-block;
            min-width: 90px;
        }

        /* ===== Question Cards ===== */
        .question {
            background: #ffffff;
            padding: 18px 20px;
            margin: 18px 0;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.06);
            line-height: 1.5;
        }

        .question b {
            display: block;
            margin-bottom: 8px;
            font-size: 16px;
        }

        .question label {
            display: block;
            margin: 6px 0;
            cursor: pointer;
        }

        /* ===== Timer / Result ===== */
        #timer {
            font-size: 20px;
            color: #c62828;
            font-weight: 700;
            text-align: center;
            margin: 12px 0;
        }

        #result {
            font-size: 22px;
            font-weight: 800;
            margin-top: 20px;
            text-align: center;
        }

        #warning {
            color: #c62828;
            font-weight: 700;
            margin-top: 10px;
            text-align: center;
        }

        /* ===== Feedback Colors ===== */
        .correct {
            color: #2e7d32;
            font-weight: bold;
        }

        .incorrect {
            color: #c62828;
            font-weight: bold;
        }

        /* ===== Buttons ===== */
        button {
            display: block;
            margin: 20px auto;
            padding: 12px 26px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            border: none;
            background: #2f5aa8;
            color: white;
            cursor: pointer;
            transition: 0.2s ease;
        }

        button:hover {
            background: #1e3f7a;
            transform: translateY(-1px);
        }

        /* ===== Select (Matching) ===== */
        select {
            width: 100%;
            padding: 6px 8px;
            border-radius: 6px;
            border: 1px solid #bbb;
            background: #fff;
            font-size: 14px;
        }

        /* ===== Matching Table ===== */
        table {
            border-collapse: collapse;
            width: 100%;
            margin-top: 12px;
            background: #fff;
        }

        table th,
        table td {
            border: 1px solid #cfd8dc;
            padding: 10px;
            text-align: left;
            vertical-align: middle;
        }

        table th {
            background-color: #e3eaf2;
            font-weight: 700;
            text-align: center;
        }

        /* ===== Center Exam Title Blocks ===== */
        .center-text {
            text-align: center;
        }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script>
        /* ================= CONFIG ================= */
        const EXAM_PASSWORD = "L5NIT-2026"; // change to your real password
        const EXAM_MINUTES = 50;
        const MAX_VIOLATIONS = 5;
        const VIOLATION_PENALTY = 2;
        const SCHOOL = "PADRI VJEKO CENTRE TSS";
        const CLASS = "L5-NIT";
        const MODULE = "NITLS501 - LINUX SERVER ADMINISTRATIONS";

        let STUDENT_NAME = "";
        let allowViolationCount = false;
        let initialLoadComplete = false;
        let violations = 0;



        let SHUFFLED = [];

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function promptExamPassword() {
            let ok = false;

            while (!ok) {
                const p = prompt("Enter Assessment Access Keyword:");
                if (p === EXAM_PASSWORD) {
                    ok = true;
                } else {
                    alert("Incorrect password. Try again.");
                }
            }
        }


        function promptStudentName() {
            let name = "";
            while (!name) {
                name = prompt("Enter your full name for the exam:");
                if (name) {
                    STUDENT_NAME = name.trim();
                    document.getElementById("student-name").innerText = STUDENT_NAME;
                    allowViolationCount = true;
                }
            }
        }

        function buildExam() {
            const container = document.getElementById("exam-container");
            SHUFFLED = shuffleArray([...QUESTIONS]);

            SHUFFLED.forEach((q, index) => {
                const div = document.createElement("div");
                div.className = "question";
                div.innerHTML = `<b>Question ${index + 1}</b>: ${q.text.replace(/\n/g, '<br>')}<br>`;

                if (q.match) {
                    const table = document.createElement("table");
                    const thead = document.createElement("thead");
                    thead.innerHTML = `<tr><th>Column A</th><th>Column B (Select)</th></tr>`;
                    table.appendChild(thead);
                    const tbody = document.createElement("tbody");

                    q.match.forEach((item, idx) => {
                        const tr = document.createElement("tr");
                        const tdA = document.createElement("td");
                        tdA.innerText = item.a;

                        const tdB = document.createElement("td");
                        const select = document.createElement("select");
                        select.name = `${q.id}_match_${idx}`;
                        select.innerHTML =
                            `<option value="">-- Select --</option>` +
                            item.bOptions.map(opt => `<option value="${opt}">${opt}</option>`).join('');

                        tdB.appendChild(select);
                        tr.appendChild(tdA);
                        tr.appendChild(tdB);
                        tbody.appendChild(tr);
                    });

                    table.appendChild(tbody);
                    div.appendChild(table);

                } else {
                    const shuffledOptions = shuffleArray([...q.options]);
                    shuffledOptions.forEach(opt => {
                        const label = document.createElement("label");
                        label.innerHTML = `<input type="radio" name="${q.id}" value="${opt.value}"> ${opt.text}`;
                        div.appendChild(label);
                        div.appendChild(document.createElement("br"));
                    });
                }

                container.appendChild(div);
            });
        }

        let seconds = EXAM_MINUTES * 60;
        let timerInt;

        function tick() {
            if (seconds <= 0) {
                seconds = 0;
                submitExam();
                return;
            }
            seconds--;

            let m = Math.floor(seconds / 60);
            let s = seconds % 60;
            document.getElementById("timer").innerText =
                `Time: ${m}:${s.toString().padStart(2, '0')}`;
        }

        function fs() {
            document.documentElement.requestFullscreen?.();
        }

        function violation(type) {
            if (!allowViolationCount || !initialLoadComplete) return;
            violations++;

            document.getElementById("warning").innerText =
                `Violation: ${type} (${violations}/${MAX_VIOLATIONS})`;

            fs(); // force back fullscreen

            if (violations >= MAX_VIOLATIONS) {
                alert("Too many violations — exam ended");
                submitExam();
            }
        }

        function submitExam() {
            clearInterval(timerInt);

            let score = 0;
            let totalMarks = 0;

            // auto calculate total marks
            SHUFFLED.forEach(q => {
                if (q.match) totalMarks += q.match.length;
                else totalMarks += 1;
            });

            let output = `<h1>ASSESSMENT RESULT</h1>`;

            const header = `<div class="header">
      <h2>School: ${SCHOOL}</h2>
      <h2>Module: ${MODULE}</h2>
      <h2>Class: ${CLASS}</h2>
      <h2>Student: ${STUDENT_NAME}</h2>
      <h2>Violations: ${violations}</h2>
      <h2>Max Obtained: TBD/${totalMarks}</h2>
    </div>`;

            output += header;

            SHUFFLED.forEach((q) => {
                output += `<div class="question"><b>${q.id.toUpperCase()}</b>: ${q.text.replace(/\n/g, '<br>')}<br>`;

                if (q.match) {
                    q.match.forEach((item, idx) => {
                        const sel = document.querySelector(`select[name="${q.id}_match_${idx}"]`);
                        const val = sel ? sel.value : "(No Answer)";
                        const ok = val === item.answer;

                        if (ok) score += 1;

                        output += `${item.a}: 
          <span class="${ok ? 'correct' : 'incorrect'}">${val}</span>
          (Correct: ${item.answer})<br>`;
                    });

                } else {
                    const sel = document.querySelector(`input[name="${q.id}"]:checked`);
                    const val = sel ? sel.value : "(No Answer)";
                    const ok = val === q.answer;

                    const selText = sel ? q.options.find(o => o.value === val)?.text : "(No Answer)";
                    const correctText = q.options.find(o => o.value === q.answer)?.text;

                    output += `Your Answer: 
        <span class="${ok ? 'correct' : 'incorrect'}">
        ${val} - ${selText}
        </span><br>`;

                    output += `Correct Answer: 
        <b>${q.answer} - ${correctText}</b><br>`;

                    if (ok) score += 1;
                }

                output += "</div>";
            });

            const penalty = violations * VIOLATION_PENALTY + 8;
            const finalScore = Math.max(score - penalty, 0);

            output = output.replace("TBD", finalScore);

            output += `<br>Raw Score: ${score}/${totalMarks}<br>`;
            output += `<br>Penalty: -${penalty}<br>`;
            output += `<div id="result">Final Score: ${finalScore}/${totalMarks}</div>`;
            output += `<button onclick="downloadPDF()">Download PDF</button>`;

            document.body.innerHTML = output;
        }

        async function downloadPDF() {
            const { jsPDF } = window.jspdf;

            const canvas = await html2canvas(document.body, {
                scale: 2,
                backgroundColor: "#eef1f4"
            });

            const imgData = canvas.toDataURL("image/png");
            const pdf = new jsPDF('p', 'mm', 'a4');

            const pageWidth = pdf.internal.pageSize.getWidth();
            const pageHeight = pdf.internal.pageSize.getHeight();

            const imgProps = pdf.getImageProperties(imgData);
            const pdfHeight = (imgProps.height * pageWidth) / imgProps.width;

            let heightLeft = pdfHeight;
            let position = 0;

            pdf.addImage(imgData, 'PNG', 0, position, pageWidth, pdfHeight);
            heightLeft -= pageHeight;

            while (heightLeft > 0) {
                position = heightLeft - pdfHeight;
                pdf.addPage();
                pdf.addImage(imgData, 'PNG', 0, position, pageWidth, pdfHeight);
                heightLeft -= pageHeight;
            }

            pdf.save(`${STUDENT_NAME}_Exam_Submission.pdf`);
        }

        function initSecurity() {
            document.addEventListener("visibilitychange", () => {
                if (document.hidden) violation("TAB_SWITCH");
            });

            window.addEventListener("blur", () => violation("WINDOW_BLUR"));

            document.addEventListener("fullscreenchange", () => {
                if (!document.fullscreenElement) violation("EXIT_FULLSCREEN");
            });

            document.addEventListener("keydown", e => {
                if ([123, 116].includes(e.keyCode)) e.preventDefault();

                if (e.ctrlKey && ["t", "n", "w", "i", "u", "r", "c"].includes(e.key.toLowerCase())) {
                    e.preventDefault();
                    violation("SHORTCUT");
                }
            });

            document.addEventListener("contextmenu", e => e.preventDefault());
            document.addEventListener("copy", e => e.preventDefault());

            window.addEventListener("beforeunload", function (e) {
                if (allowViolationCount && initialLoadComplete) {
                    e.preventDefault();
                    e.returnValue = "";
                }
            });
        }

        window.onload = () => {
            promptExamPassword();   // 🔐 FIRST — password
            promptStudentName();    // 👤 THEN — student name
            fs();
            buildExam();
            initSecurity();
            timerInt = setInterval(tick, 1000);
            initialLoadComplete = true;
        };


    </script>
</head>

<body>

    <div class="exam-wrapper">

        <div class="header">
            <h2>PADRI VJEKO CENTRE TSS</h2>
            <p><strong>Class:</strong> L5-NIT</p>
            <p><strong>Module:</strong> GENPP502-PYTHON PROGRAMMING
                FUNDAMENTALS </p>
            <p><strong>Trainee:</strong> <span id="student-name">(Enter
                    Name)</span></p>
        </div>

        <div id="timer" class="center-text"></div>
        <div id="warning" class="center-text"></div>

        <div id="exam-container"></div>

        <button onclick="submitExam()">Submit Examination</button>

    </div>

</body>

</html>
