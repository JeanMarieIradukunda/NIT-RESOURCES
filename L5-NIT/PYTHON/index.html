        body {

        /* Main Container */
        .dashboard-card {
            background: #ffffff;

            padding: 40px;
            max-width: 1300px;
            margin: auto;

        }

        /* Grid */
        .folder-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
            gap: 28px;
        }

        /* Cards */
        .folder-card {
            text-decoration: none;
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 18px;
            padding: 30px 20px;
            text-align: center;
            transition: all 0.3s ease;
            color: #111827;
        }

        .folder-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 18px 35px rgba(0, 0, 0, 0.12);
        }

        /* Icons */
        .folder-card i {
            font-size: 50px;
            margin-bottom: 14px;
            display: block;
        }

        /* Title */
        .folder-title {
            font-weight: 600;
            font-size: 1rem;
            word-break: break-word;
        }

        /* Icon Colors */
        .folder i {
            color: #2563eb;
        }

            color: #dc2626;
        }

        .html i {
            color: #16a34a;
        }

        .code i {

        }

        /* Back Button */
        .back-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
            font-weight: 600;
            color: #2563eb;
        }

        .back-btn:hover {
            color: #1d4ed8;
        }

        /* Responsive */
        @media(max-width:576px) {
            body {
                padding: 20px;
            }

            .dashboard-card {
                padding: 25px;
