      {value:"B", text:"Above the function definition using @"},

      {value:"A", text:"A list"},

  { id: "q17", text: `Which of the following correctly uses filter to remove negative numbers from a list?
<pre><code class="language-python">
filter(lambda x: x > 0, my_list)
</code></pre>`, options:[
      {value:"A", text:"filter(lambda x: x>0, my_list)"},

<pre><code class="language-python">
sorted(data, key=lambda x: x['age'])
</code></pre>`, options:[

      {value:"B", text:"sort(data, key=lambda x['age'])"},
      {value:"C", text:"data.sort(key=lambda x.age)"},
      {value:"D", text:"sorted(data, key='age')"}

  { id: "q19", text: `What will the following code output?
<pre><code class="language-python">
nums = [3, 1, 4, 2]
print(sorted(nums, reverse=True))
</code></pre>`, options:[
      {value:"A", text:"[1, 2, 3, 4]"},
      {value:"B", text:"[4, 3, 2, 1]"},
      {value:"C", text:"[3, 1, 4, 2]"},
      {value:"D", text:"Error"}
    ], answer:"B" },

  { id: "q20", text: `Fill in the blank to print even numbers from a list:
<pre><code class="language-python">
numbers = [1, 2, 3, 4, 5, 6]
evens = filter(____, numbers)
print(list(evens))
</code></pre>`, options:[
      {value:"A", text:"lambda x: x % 2 == 0"},
      {value:"B", text:"lambda x: x % 2 != 0"},
      {value:"C", text:"x % 2 == 0"},
      {value:"D", text:"map(lambda x: x % 2 == 0)"}
    ], answer:"A" },

  { id: "q21", text: `Identify the syntax error in this function:
<pre><code class="language-python">
def add_numbers(a, b)
    return a + b
</code></pre>`, options:[
      {value:"A", text:"Missing colon ':' after function signature"},
      {value:"B", text:"Missing return keyword"},
      {value:"C", text:"Incorrect function name"},
      {value:"D", text:"No error"}
    ], answer:"A" },

  { id: "q22", text: `Fill in the missing keyword to define a function:
<pre><code class="language-python">
____ my_function():
    print("Hello")
</code></pre>`, options:[
      {value:"A", text:"def"},
      {value:"B", text:"function"},
      {value:"C", text:"lambda"},
      {value:"D", text:"fun"}
    ], answer:"A" },

  { id: "q23", text: `Why does this lambda function cause an error?
<pre><code class="language-python">
f = lambda x: 
    x + 1
</code></pre>`, options:[
      {value:"A", text:"Parentheses are missing around x"},
      {value:"B", text:"Colon is missing"},
      {value:"C", text:"Lambda cannot have a multi-line body or indentation"},
      {value:"D", text:"return keyword is required"}
    ], answer:"C" },

  { id: "q24", text: `Detect the issue in this code:
<pre><code class="language-python">

squared = map(lambda x: x**2, nums)
print(squared)
</code></pre>`, options:[
      {value:"A", text:"map cannot be used with lambda"},
      {value:"B", text:"map returns an iterator; convert it to a list to see values"},

  { id: "q25", text: `Which keyword is missing to properly define a decorator function?
<pre><code class="language-python">

  { id: "q26", text: "After wrapping a function, what does a Python decorator return?", options:[

    ], answer:"B" },

  { id: "q27", text: "Which of the following statements about Python is correct?", options:[

      {value:"D", text:"filter() returns a list by default"}
    ], answer:"B" },

  { id: "q28", text: "Which statement about the @staticmethod decorator is true?", options:[

<pre><code class="language-python">

</code></pre>`, options:[

  { id: "q30", text: "What is the main purpose of a Python decorator?", options:[
      {value:"A", text:"To repeat a loop faster"},

      {value:"C", text:"To create anonymous functions"},
      {value:"D", text:"To sort data automatically"}

];

/* ---------- REFRESH TRACKING ---------- */
function handleRefreshTracking() {
  let count = Number(sessionStorage.getItem("refreshCount") || "0");
  count++;
  sessionStorage.setItem("refreshCount", count);
  if (count <= FREE_REFRESHES) return false;
  return true;
}

/* ---------- UTILITY ---------- */
function shuffleArray(array){
  for (let i=array.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [array[i],array[j]]=[array[j],array[i]];
  }
  return array;
}

/* ---------- NAME ---------- */
function promptStudentName(){
  let name="";
  while(!name){
    name = prompt("Enter your full name for the exam:");
    if(name){
      STUDENT_NAME = name.trim();
      document.getElementById("student-name").innerText = STUDENT_NAME;
      allowViolationCount = true;
    }
  }
}

/* ---------- BUILD EXAM ---------- */
function buildExam(){
  const container=document.getElementById("exam-container");
  const shuffled=shuffleArray([...QUESTIONS]);
  shuffled.forEach(q=>{
    const div=document.createElement("div");
    div.className="question";
    div.innerHTML=`<b>${q.id.toUpperCase()}</b>: ${q.text}<br>`;
    shuffleArray([...q.options]).forEach(opt=>{
      const label=document.createElement("label");
      label.innerHTML=`<input type="radio" name="${q.id}" value="${opt.value}"> ${opt.text}`;
      div.appendChild(label);
      div.appendChild(document.createElement("br"));
    });
    container.appendChild(div);
  });
}

/* ---------- TIMER ---------- */
let seconds = EXAM_MINUTES * 30;
let timerInt;
function tick(){
  seconds--;
  let m = Math.floor(seconds/60);
  let s = seconds % 60;
  document.getElementById("timer").innerText = `Time: ${m}:${s.toString().padStart(2,'0')}`;
  if(seconds <= 0) submitExam();
}

/* ---------- FULLSCREEN ---------- */
function fs(){ document.documentElement.requestFullscreen?.(); }

/* ---------- VIOLATIONS ---------- */
function violation(type){
  if(!allowViolationCount || !initialLoadComplete) return;
  violations++;
  document.getElementById("warning").innerText=`Violation: ${type} (${violations}/${MAX_VIOLATIONS})`;
  if(violations >= MAX_VIOLATIONS){
    alert("Too many violations — exam ended");
    submitExam();
  }
}

/* ---------- SUBMIT ---------- */
function submitExam(){
  clearInterval(timerInt);
  sessionStorage.removeItem("refreshCount");
  let score=0;
  const total=QUESTIONS.length;
  let output=`<h1>Exam Submitted</h1>`;

  QUESTIONS.forEach(q=>{
    const sel=document.querySelector(`input[name="${q.id}"]:checked`);
    const ans=sel?sel.value:"(No Answer)";
    const ok=ans===q.answer;
    if(ok) score++;
    output+=`<div class="question">
      <b>${q.id.toUpperCase()}</b><br>
      Your Answer: <span class="${ok?'correct':'incorrect'}">${ans}</span><br>
      Correct: <b>${q.answer}</b>
    </div>`;
  });

  const penalty = violations * VIOLATION_PENALTY;
  const afterPenalty = Math.max(score - penalty, 0);
  const finalScore = Math.min(afterPenalty + BONUS_MARKS, total);

  const header = `<div class="header">
  <h2>Module: ${MODULE}</h2>
  <h2>Class: ${CLASS}</h2>
  <h2>School: ${SCHOOL}</h2>
  <h2>Student: ${STUDENT_NAME}</h2>
  <h2>Violations: ${violations}</h2>
  <h2>Max Obtained: ${finalScore}/${total}</h2>
  </div>`;

  output = `<h1>Exam Submitted</h1>` + header + output;
  output += `<br>Raw Score: ${score}/${total}<br>Penalty: -${penalty}<br>Bonus Added: +${BONUS_MARKS}<br>`;
  output += `<div id="result">Final Score: ${finalScore}/${total}</div>`;
  document.body.innerHTML=output;
}

/* ---------- SECURITY ---------- */
function initSecurity(){
  document.addEventListener("visibilitychange",()=>{ if(document.hidden) violation("TAB_SWITCH"); });
  window.addEventListener("blur",()=> violation("WINDOW_BLUR"));
  document.addEventListener("fullscreenchange",()=>{ if(!document.fullscreenElement) violation("EXIT_FULLSCREEN"); });
  document.addEventListener("keydown",e=>{
    if([123,116].includes(e.keyCode)) e.preventDefault();
    if(e.ctrlKey && ["t","n","w","i","u","r"].includes(e.key.toLowerCase())){
      e.preventDefault(); violation("SHORTCUT");
    }
  });
  document.addEventListener("contextmenu",e=>e.preventDefault());
  window.addEventListener("beforeunload",function(e){
    if(allowViolationCount && initialLoadComplete){
      if(handleRefreshTracking()) violation("PAGE_REFRESH_OR_CLOSE");
    }
    e.preventDefault();
    e.returnValue="";
  });
}

/* ---------- INIT ---------- */
window.onload=()=>{
  promptStudentName();
  fs();
  buildExam();
  initSecurity();
  timerInt=setInterval(tick,1000);
  initialLoadComplete=true;
};
</script>

  <body>
    <h1>Secure Exam</h1>
    <div class="header">
      <h2>School: PADRI VJEKO CENTRE TSS</h2>
      <h2>Class: L5-NIT</h2>
      <h2>Module: GENPP502 - PYTHON PROGRAMMING</h2>
      <h2>Student: <span id="student-name">(Enter Name)</span></h2>
    </div>
    <div id="timer"></div>
    <div id="warning"></div>
    <div id="exam-container"></div>
    <button onclick="submitExam()">Submit Exam</button>
  </body>
