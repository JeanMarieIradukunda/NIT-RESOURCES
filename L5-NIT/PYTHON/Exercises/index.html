<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

<style>
body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: linear-gradient(135deg, #eef2ff, #f8fafc);
    min-height: 100vh;
    padding: 40px;
}
.dashboard-card {
    background: #ffffff;
    border-radius: 20px;
    padding: 40px 30px;
    max-width: 1200px;
    margin: 0 auto;
    box-shadow: 0 20px 40px rgba(0,0,0,0.1);
    transition: all 0.3s ease;
}
.dashboard-card:hover {
    transform: translateY(-2px);
}
.dashboard-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    margin-bottom: 30px;
}
.dashboard-header h1 {
    font-size: 2.2rem;
    font-weight: 700;
    color: #1f2937;
}
.folder-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 25px;
}
.folder-card {
    text-decoration: none;
    border-radius: 16px;
    padding: 25px 20px;
    text-align: center;
    transition: all 0.25s ease;
    color: #111827;
    background: #f9fafb;
    border: 1px solid #e5e7eb;
}
.folder-card:hover {
    transform: translateY(-10px);
    box-shadow: 0 15px 35px rgba(0,0,0,0.15);
}
.folder-card i {
    font-size: 52px;
    margin-bottom: 12px;
}
.folder-title {
    font-weight: 700;
    font-size: 1.1rem;
    margin-bottom: 5px;
}
.folder-meta {
    font-size: 0.85rem;
    color: #6b7280;
}

/* COLORS */
.exams { background:#fde68a; }
.courses { background:#bfdbfe; }
.classes { background:#bbf7d0; }
.resources { background:#e9d5ff; }

.exams i { color:#92400e; }
.courses i { color:#1e40af; }
.classes i { color:#065f46; }
.resources i { color:#6b21a8; }

@media (max-width: 992px) {
    .folder-row { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 576px) {
    .folder-row { grid-template-columns: 1fr; }
}
</style>
</head>

<div class="dashboard-card">
