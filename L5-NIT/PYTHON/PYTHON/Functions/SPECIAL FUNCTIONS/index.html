<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1.0'>
<title>SPECIAL FUNCTIONS DASHBOARD</title>

<link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css' rel='stylesheet'>
<link href='https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css' rel='stylesheet'>

<style>
body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: linear-gradient(135deg, #eef2ff, #f8fafc);
    min-height: 100vh;
    padding: 30px;
}
.dashboard-card {
    background: #ffffff;
    border-radius: 20px;
    padding: 35px 30px;
    max-width: 1300px;
    margin: 0 auto;
    box-shadow: 0 20px 40px rgba(0,0,0,0.1);
}
.dashboard-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    margin-bottom: 25px;
}
.dashboard-header h1 {
    font-size: 2.2rem;
    font-weight: 700;
    color: #1f2937;
}
.dashboard-header .search-bar {
    width: 250px;
}
.folder-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 25px;
}
.folder-card {
    position: relative;
    text-decoration: none;
    border-radius: 20px;
    padding: 30px 20px;
    text-align: center;
    transition: all 0.3s ease;
    color: #111827;
}
.folder-card:hover {
    transform: translateY(-10px);
    box-shadow: 0 20px 40px rgba(0,0,0,0.2);
}
.folder-card i {
    font-size: 50px;
    margin-bottom: 15px;
    transition: all 0.3s ease;
}
.folder-card:hover i {
    transform: scale(1.2);
}
.folder-title {
    font-weight: 700;
    font-size: 1.1rem;
    margin-bottom: 10px;
}
.folder-badge {
    position: absolute;
    top: 15px;
    right: 15px;
    font-size: 0.75rem;
    font-weight: 600;
    padding: 5px 8px;
    border-radius: 12px;
    color: #fff;
}

/* COLOR-CODED CARDS */
.python { background:#fef3c7; }       /* light yellow */
.html { background:#dbeafe; }         /* light blue */
.text { background:#e5e7eb; }         /* light gray */
.function { background:#ede9fe; }     /* light purple */

.python i, .python .folder-badge { color:#b45309; background:#fbbf24; }
.html i, .html .folder-badge { color:#1e40af; background:#3b82f6; }
.text i, .text .folder-badge { color:#374151; background:#6b7280; }
.function i, .function .folder-badge { color:#6b21a8; background:#a78bfa; }

.parent-header {
    margin-bottom: 25px;
    padding: 15px 20px;
    border-radius: 15px;
    background: #f0f9ff;
    display: flex;
    align-items: center;
    gap: 12px;
}

@media (max-width: 992px) {
    .folder-row { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 576px) {
    .folder-row { grid-template-columns: 1fr; }
    .dashboard-header { flex-direction: column; gap: 15px; }
    .dashboard-header .search-bar { width: 100%; }
}
</style>
</head>

<body>

<div class='dashboard-card'>
    <div class='dashboard-header'>
        <h1>SPECIAL FUNCTIONS</h1>
        <input type="text" placeholder="Search..." class="form-control search-bar" id="searchInput">
    </div>

    <div class='parent-header'>
        <a href='../' style='text-decoration:none; color:#1e40af; font-weight:600; display:flex; align-items:center; gap:6px;'>
            <i class='bi bi-arrow-left-circle-fill' style='font-size:1.5rem;'></i> Parent Directory
        </a>
    </div>

    <div class='folder-row' id="folderRow">
        <a href='dict.py' class='folder-card python'>
            <i class='bi bi-file-code-fill'></i>
            <div class='folder-title'>dict</div>
            <div class='folder-badge'>PY</div>
        </a>
        <a href='dictionary.html' class='folder-card html'>
            <i class='bi bi-file-earmark-text-fill'></i>
            <div class='folder-title'>dictionary</div>
            <div class='folder-badge'>HTML</div>
        </a>
        <a href='Login-Auth.txt' class='folder-card text'>
            <i class='bi bi-file-text-fill'></i>
            <div class='folder-title'>Login-Auth</div>
            <div class='folder-badge'>TXT</div>
        </a>
        <a href='Lambda-Functions.html' class='folder-card function'>
            <i class='bi bi-lightning-fill'></i>
            <div class='folder-title'>LAMBDA-FUNCTIONS</div>
            <div class='folder-badge'>FUNC</div>
        </a>
        <a href='Generator-Functions.html' class='folder-card function'>
            <i class='bi bi-arrow-repeat'></i>
            <div class='folder-title'>GENERATOR-FUNCTIONS</div>
            <div class='folder-badge'>FUNC</div>
        </a>
        <a href='Python-Closures.html' class='folder-card function'>
            <i class='bi bi-shield-fill-check'></i>
            <div class='folder-title'>CLOSURES</div>
            <div class='folder-badge'>FUNC</div>
        </a>
        <a href='Pyhton-Decorators.html' class='folder-card function'>
            <i class='bi bi-stars'></i>
            <div class='folder-title'>DECORATORS</div>
            <div class='folder-badge'>FUNC</div>
        </a>
        <a href='Pyhton-Recursive-Functions.html' class='folder-card function'>
            <i class='bi bi-box-arrow-in-down'></i>
            <div class='folder-title'>RECURSIVE-FUNCTIONS</div>
            <div class='folder-badge'>FUNC</div>
        </a>
        <a href='Pyhton-High-Oreder-Functions.html' class='folder-card function'>
            <i class='bi bi-diagram-3-fill'></i>
            <div class='folder-title'>HIGH-ORDER-FUNCTIONS</div>
            <div class='folder-badge'>FUNC</div>
        </a>
    </div>
</div>

<script>
// Simple Search Filter
const searchInput = document.getElementById('searchInput');
const folderRow = document.getElementById('folderRow');
searchInput.addEventListener('keyup', () => {
    const filter = searchInput.value.toLowerCase();
    Array.from(folderRow.children).forEach(card => {
        const title = card.querySelector('.folder-title').textContent.toLowerCase();
        card.style.display = title.includes(filter) ? 'block' : 'none';
    });
});
</script>

</body>
</html>
