<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dictionary - Assignments</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #e2e8f0;
            padding: 40px 20px;
        }

        .wrapper {
            max-width: 1000px;
            margin: auto;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(18px);
            border-radius: 20px;
            padding: 35px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .title {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(90deg, #38bdf8, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .back-btn {
            background: rgba(255,255,255,0.1);
            color: #fff;
            padding: 8px 18px;
            border-radius: 50px;
            text-decoration: none;
            transition: 0.3s;
        }

        .back-btn:hover {
            background: #6366f1;
            transform: translateY(-2px);
        }

        .file-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            border-radius: 14px;
            background: rgba(255,255,255,0.07);
            transition: 0.3s;
        }

        .file-item:hover {
            background: rgba(99,102,241,0.2);
            transform: translateY(-3px);
        }

        .file-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .file-icon {
            font-size: 1.5rem;
            color: #facc15;
        }

        .file-link {
            text-decoration: none;
            color: #e2e8f0;
            font-weight: 500;
        }

        .file-link:hover {
            color: #38bdf8;
        }

        .download-btn {
            background: #38bdf8;
            color: #0f172a;
            padding: 6px 14px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            transition: 0.3s;
        }

        .download-btn:hover {
            background: #0ea5e9;
        }

        @media(max-width: 600px){
            .file-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
        }
    </style>
</head>

<body>

<div class="wrapper">

    <div class="header">
        <div class="title">Dictionary Files</div>
        <a href="../" class="back-btn">
            <i class="bi bi-arrow-left"></i> Parent Directory
        </a>
    </div>

    <div class="file-list">

        <div class="file-item">
            <div class="file-left">
                <i class="bi bi-filetype-py file-icon"></i>
                <a href="./assignment-One.py" download="assignment-One.py" class="file-link">
                    assignment-One.py
                </a>
            </div>
            <a href="./assignment-One.py" download="assignment-One.py" class="download-btn">
                Download
            </a>
        </div>

        <div class="file-item">
            <div class="file-left">
                <i class="bi bi-filetype-py file-icon"></i>
                <a href="./assignment-Three.py" download="assignment-Three.py" class="file-link">
                    assignment-Three.py
                </a>
            </div>
            <a href="./assignment-Three.py" download="assignment-Three.py" class="download-btn">
                Download
            </a>
        </div>

        <div class="file-item">
            <div class="file-left">
                <i class="bi bi-filetype-py file-icon"></i>
                <a href="./assignment-Two.py" download="assignment-Two.py" class="file-link">
                    assignment-Two.py
                </a>
            </div>
            <a href="./assignment-Two.py" download="assignment-Two.py" class="download-btn">
                Download
            </a>
        </div>
        <div class="file-item">
            <div class="file-left">
                <i class="bi bi-filetype-py file-icon"></i>
                <a href="./stack_and_Quee.py" download="assignment-Two.py" class="file-link">
                    stack_and_Queue
                </a>
            </div>
            <a href="./assignment-Two.py" download="assignment-Two.py" class="download-btn">
                Download
            </a>
        </div>

    </div>

</div>

</body>
</html>
