<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>L5-NIT Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body{
            margin:0;
            font-family:'Segoe UI',sans-serif;
            background: linear-gradient(135deg,#0f172a,#1e293b);
            min-height:100vh;
            padding:40px;
            color:white;
        }

        .dashboard{
            max-width:1200px;
            margin:auto;
        }

        .header{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:40px;
        }

        .header h1{
            font-weight:700;
            letter-spacing:1px;
        }

        .back-btn{
            text-decoration:none;
            background:#2563eb;
            color:white;
            padding:8px 15px;
            border-radius:10px;
            transition:0.3s;
        }

        .back-btn:hover{
            background:#1d4ed8;
        }

        .grid{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
            gap:25px;
        }

        .card-item{
            text-decoration:none;
            background:rgba(255,255,255,0.08);
            backdrop-filter:blur(10px);
            border-radius:18px;
            padding:35px 20px;
            text-align:center;
            transition:0.3s;
            color:white;
            border:1px solid rgba(255,255,255,0.1);
        }

        .card-item:hover{
            transform:translateY(-10px);
            background:rgba(255,255,255,0.15);
        }

        .card-item i{
            font-size:55px;
            margin-bottom:15px;
        }

        .title{
            font-size:1.1rem;
            font-weight:600;
            letter-spacing:0.5px;
        }

        /* ICON COLORS */
        .linux i{ color:#22c55e; }
        .python i{ color:#facc15; }
        .celebrate i{ color:#f43f5e; }

        @media(max-width:576px){
            body{ padding:20px; }
        }
    </style>
</head>

<body>

<div class="dashboard">

    <div class="header">
        <h1>L5-NIT</h1>
        <a href="../" class="back-btn">
            <i class="bi bi-arrow-left"></i> Parent
        </a>
    </div>

    <div class="grid">

        <!-- Linux Folder -->
        <a href="LINUX/" class="card-item linux">
            <i class="bi bi-terminal-fill"></i>
            <div class="title">LINUX</div>
        </a>

        <!-- Python Folder -->
        <a href="PYTHON/" class="card-item python">
            <i class="bi bi-filetype-py"></i>
            <div class="title">PYTHON</div>
        </a>

        <!-- HTML File -->
        <a href="SSAS.HTML" class="card-item celebrate">
            <i class="bi bi-filetype-html"></i>
            <div class="title">BIG-CELEBRATE</div>
        </a>

        <!-- PyInstaller Notes -->
        <a href="pyinstaller_notes.html" class="card-item python">
            <i class="bi bi-gear-fill"></i>
            <div class="title">PYINSTALLER NOTES</div>
        </a>
        <a href="cloud.html" class="card-item python">
            <i class="bi bi-gear-fill"></i>
            <div class="title">Cloud</div>
        </a>

        <!-- link to submit files with correct and related icons and descriptions -->
        <a href="Upload.aspx" class="card-item celebrate">
            <i class="bi bi-upload"></i>
            <div class="title">Submit your file (not folder please)</div>
        </a>    
    </div>

</div>

</body>
</html>
