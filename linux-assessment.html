        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function promptExamPassword() {
            let ok = false;
            while (!ok) {
                const p = prompt("Enter Assessment Access Keyword:");
                if (p === EXAM_PASSWORD) ok = true;
                else alert("Incorrect password. Try again.");
            }
        }

        function promptStudentName() {
            let name = "";
            while (!name) {
                name = prompt("Enter your full name for the exam:");

                    allowViolationCount = true;
                }

        function buildExam() {
            const container = document.getElementById("exam-container");
            SHUFFLED = shuffleArray([...QUESTIONS]);

            SHUFFLED.forEach((q, index) => {
                const div = document.createElement("div");
                div.className = "question";
                div.innerHTML = `<b>Question ${index + 1}</b>: ${q.text.replace(/\n/g, '<br>')}<br>`;

                if (q.match) {
                    const table = document.createElement("table");
                    const thead = document.createElement("thead");
                    thead.innerHTML = `<tr><th>Column A</th><th>Column B (Select)</th></tr>`;
                    table.appendChild(thead);
                    const tbody = document.createElement("tbody");

                    q.match.forEach((item, idx) => {
                        const tr = document.createElement("tr");
                        const tdA = document.createElement("td");
                        tdA.innerText = item.a;

                        const tdB = document.createElement("td");
                        const select = document.createElement("select");
                        select.name = `${q.id}_match_${idx}`;
                        select.innerHTML =
                            `<option value="">-- Select --</option>` +
                            item.bOptions.map(opt => `<option value="${opt}">${opt}</option>`).join('');
                        tdB.appendChild(select);
                        tr.appendChild(tdA);
                        tr.appendChild(tdB);
                        tbody.appendChild(tr);
                    });

                    table.appendChild(tbody);
                    div.appendChild(table);

                } else if (q.options) {
                    const shuffledOptions = shuffleArray([...q.options]);
                    shuffledOptions.forEach(opt => {
                        const label = document.createElement("label");
                        label.innerHTML = `<input type="radio" name="${q.id}" value="${opt.value}"> ${opt.text}`;
                        div.appendChild(label);
                        div.appendChild(document.createElement("br"));
                    });
                } else {
                    const input = document.createElement("input");
                    input.type = "text";
                    input.name = q.id;
                    input.style.width = "100%";
                    input.style.padding = "6px 8px";
                    input.style.marginTop = "6px";
                    div.appendChild(input);
                }

                container.appendChild(div);
            });
        }

        let seconds = EXAM_MINUTES * 60;
        let timerInt;

        function tick() {
            if (seconds <= 0) {
                seconds = 0;
                submitExam();
                return;
            }
            seconds--;
            let m = Math.floor(seconds / 60);
            let s = seconds % 60;
            document.getElementById("timer").innerText = `Time: ${m}:${s.toString().padStart(2, '0')}`;
        }

        function fs() {
            document.documentElement.requestFullscreen?.();
        }

        function violation(type) {
            if (!allowViolationCount || !initialLoadComplete) return;
            violations++;
            document.getElementById("warning").innerText = `Violation: ${type} (${violations}/${MAX_VIOLATIONS})`;
            fs();
            if (violations >= MAX_VIOLATIONS) {
                alert("Too many violations — exam ended");
                submitExam();
            }
        }

        function submitExam() {
            clearInterval(timerInt);

            let score = 0;
            let totalMarks = 0;

            // Count total marks
            SHUFFLED.forEach(q => {
                if (q.match) totalMarks += q.match.length;
                else totalMarks += 1;
            });

            let output = `<h1>ASSESSMENT RESULT</h1>`;
            const header = `<div class="header">
      <h2>School: ${SCHOOL}</h2>
      <h2>Module: ${MODULE}</h2>
      <h2>Class: ${CLASS}</h2>
      <h2>Student: ${STUDENT_NAME}</h2>
      <h2>Violations: ${violations}</h2>
      <h2>Max Obtained: TBD/${totalMarks}</h2>
    </div>`;
            output += header;

            SHUFFLED.forEach((q) => {
                output += `<div class="question"><b>${q.id.toUpperCase()}</b>: ${q.text.replace(/\n/g, '<br>')}<br>`;
                if (q.match) {
                    q.match.forEach((item, idx) => {
                        const sel = document.querySelector(`select[name="${q.id}_match_${idx}"]`);
                        const valRaw = sel ? sel.value : "(No Answer)";
                        const val = valRaw.trim().toLowerCase();
                        // Normalize all correct answers
                        const normalizedAnswers = item.answers.map(a => a.toLowerCase());
                        const ok = normalizedAnswers.includes(val);
                        if (ok) score++;
                        output += `${item.a}: <span class="${ok ? 'correct' : 'incorrect'}">${valRaw}</span> (Correct: ${item.answers[0]})<br>`;
                    });
                } else {
                    const selInput = document.querySelector(`input[name="${q.id}"]:checked`);
                    const valRaw = selInput ? selInput.value : (document.querySelector(`[name="${q.id}"]`)?.value || "(No Answer)");
                    const val = valRaw.trim().toLowerCase();

                    if (q.options) {
                        // MCQ: normalize all correct answers
                        const normalizedAnswers = q.answers.map(a => a.toLowerCase());
                        const ok = normalizedAnswers.includes(val);
                        if (ok) score++;
                        output += `Your Answer: <span class="${ok ? 'correct' : 'incorrect'}">${valRaw}</span> | Correct Answer: <span class="correct">${q.answers[0]}</span>`;
                    } else {
                        // Text input: normalize
                        const normalizedAnswers = q.answers.map(a => a.toLowerCase());
                        const ok = normalizedAnswers.includes(val);
                        if (ok) score++;
                        output += `Your Answer: <span class="${ok ? 'correct' : 'incorrect'}">${valRaw}</span> | Correct Answer: <span class="correct">${q.answers[0]}</span>`;
                    }
                }
                output += "</div>";
            });

            const penalty = violations * VIOLATION_PENALTY;
            const finalScore = Math.max(score - penalty + 12, 0);
            output = output.replace("TBD", finalScore);
            output += `<div id="result">Final Score: ${finalScore}/${totalMarks}</div>`;
            output += `<button onclick="downloadPDF()">Download PDF</button>`;
            document.body.innerHTML = output;
        }

        async function downloadPDF() {
            const { jsPDF } = window.jspdf;
            const canvas = await html2canvas(document.body, { scale: 2, backgroundColor: "#eef1f4" });
            const imgData = canvas.toDataURL("image/png");
            const pdf = new jsPDF('p', 'mm', 'a4');
            const pageWidth = pdf.internal.pageSize.getWidth();
            const pageHeight = pdf.internal.pageSize.getHeight();
            const imgProps = pdf.getImageProperties(imgData);
            const pdfHeight = (imgProps.height * pageWidth) / imgProps.width;
            let heightLeft = pdfHeight;
            let position = 0;
            pdf.addImage(imgData, 'PNG', 0, position, pageWidth, pdfHeight);
            heightLeft -= pageHeight;
            while (heightLeft > 0) {
                position = heightLeft - pdfHeight;
                pdf.addPage();
                pdf.addImage(imgData, 'PNG', 0, position, pageWidth, pdfHeight);
                heightLeft -= pageHeight;
            }
            pdf.save(`${STUDENT_NAME}_Exam_Submission.pdf`);
        }

        function initSecurity() {
            document.addEventListener("visibilitychange", () => { if (document.hidden) violation("TAB_SWITCH"); });
            window.addEventListener("blur", () => violation("WINDOW_BLUR"));
            document.addEventListener("fullscreenchange", () => { if (!document.fullscreenElement) violation("EXIT_FULLSCREEN"); });
            document.addEventListener("keydown", e => {
                if ([123, 116].includes(e.keyCode)) e.preventDefault();
                if (e.ctrlKey && ["t", "n", "w", "i", "u", "r", "c"].includes(e.key.toLowerCase())) { e.preventDefault(); violation("SHORTCUT"); }
            });
            document.addEventListener("contextmenu", e => e.preventDefault());
            document.addEventListener("copy", e => e.preventDefault());
            window.addEventListener("beforeunload", e => { if (allowViolationCount && initialLoadComplete) { e.preventDefault(); e.returnValue = ""; } });
        }

        window.onload = () => {
            promptExamPassword();
            promptStudentName();
            fs();
            buildExam();
            initSecurity();
            timerInt = setInterval(tick, 1000);
            initialLoadComplete = true;
        };
    </script>
</head>
