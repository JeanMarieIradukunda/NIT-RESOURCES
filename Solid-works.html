<!DOCTYPE html>
<html>

  <head>
    <meta charset="UTF-8">
    <title>L5-WOT Formative Assessment of SolidWorks</title>
    <style>
  body {
    font-family: Inter, "Segoe UI", Arial, sans-serif;
    background: #eef1f4;
    padding: 20px;
    margin: 0;
  }

  /* ===== Main Center Container ===== */
  .exam-wrapper {
    max-width: 900px;
    margin: auto;
  }

 /* ===== Header ===== */
.header {
  background: #dde4eb;
  padding: 22px 26px;
  border-radius: 10px;
  margin-bottom: 22px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);

  font-family: Inter, "Segoe UI", Arial, sans-serif;

  /* layout control */
  text-align: left;
  max-width: 760px;
  margin-left: auto;
  margin-right: auto;
}

/* Main title */
.header h2 {
  margin: 0 0 10px 0;
  font-size: 22px;
  font-weight: 800;
  letter-spacing: 0.3px;
}

/* Detail rows */
.header p {
  margin: 4px 0;
  font-size: 15px;
  font-weight: 500;
}

/* Optional: make labels align perfectly */
.header p strong {
  display: inline-block;
  min-width: 90px;
}

  /* ===== Question Cards ===== */
  .question {
    background: #ffffff;
    padding: 18px 20px;
    margin: 18px 0;
    border-radius: 10px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.06);
    line-height: 1.5;
  }

  .question b {
    display: block;
    margin-bottom: 8px;
    font-size: 16px;
  }

  .question label {
    display: block;
    margin: 6px 0;
    cursor: pointer;
  }

  /* ===== Timer / Result ===== */
  #timer {
    font-size: 20px;
    color: #c62828;
    font-weight: 700;
    text-align: center;
    margin: 12px 0;
  }

  #result {
    font-size: 22px;
    font-weight: 800;
    margin-top: 20px;
    text-align: center;
  }

  #warning {
    color: #c62828;
    font-weight: 700;
    margin-top: 10px;
    text-align: center;
  }

  /* ===== Feedback Colors ===== */
  .correct {
    color: #2e7d32;
    font-weight: bold;
  }

  .incorrect {
    color: #c62828;
    font-weight: bold;
  }

  /* ===== Buttons ===== */
  button {
    display: block;
    margin: 20px auto;
    padding: 12px 26px;
    font-size: 16px;
    font-weight: 600;
    border-radius: 8px;
    border: none;
    background: #2f5aa8;
    color: white;
    cursor: pointer;
    transition: 0.2s ease;
  }

  button:hover {
    background: #1e3f7a;
    transform: translateY(-1px);
  }

  /* ===== Select (Matching) ===== */
  select {
    width: 100%;
    padding: 6px 8px;
    border-radius: 6px;
    border: 1px solid #bbb;
    background: #fff;
    font-size: 14px;
  }

  /* ===== Matching Table ===== */
  table {
    border-collapse: collapse;
    width: 100%;
    margin-top: 12px;
    background: #fff;
  }

  table th,
  table td {
    border: 1px solid #cfd8dc;
    padding: 10px;
    text-align: left;
    vertical-align: middle;
  }

  table th {
    background-color: #e3eaf2;
    font-weight: 700;
    text-align: center;
  }

  /* ===== Center Exam Title Blocks ===== */
  .center-text {
    text-align: center;
  }

</style>

    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script>
    /* ================= CONFIG ================= */
    const EXAM_MINUTES = 40;
    const MAX_VIOLATIONS = 3;
    const VIOLATION_PENALTY = 2;
    const SCHOOL = "PADRI VJEKO CENTRE TSS";
    const CLASS = "L5-WOT";
    const MODULE = "FORMATIVE ASSESSMENT OF SOLIDWORKS";

    let STUDENT_NAME = "";
    let allowViolationCount = false;
    let initialLoadComplete = false;
    let violations = 0;

    /* ================= QUESTIONS ================= */
    const QUESTIONS = [
      { id: "q1", text: "Which SolidWorks command is used to bring an already created part into an assembly?", options: [{ value: "A", text: "Open Part" }, { value: "B", text: "Insert Components" }, { value: "C", text: "Feature Manager" }, { value: "D", text: "Sketch" }], answer: "B" },
      { id: "q2", text: "What is the correct file extension for a SolidWorks assembly file?", options: [{ value: "A", text: ".sldprt" }, { value: "B", text: ".slddrw" }, { value: "C", text: ".sldasm" }, { value: "D", text: ".pdf" }], answer: "C" },
      { id: "q3", text: "Which type of mate makes two round parts share the same center line?", options: [{ value: "A", text: "Parallel" }, { value: "B", text: "Coincident" }, { value: "C", text: "Concentric" }, { value: "D", text: "Tangent" }], answer: "C" },
      { id: "q4", text: "Which file format is commonly used when preparing an assembly for 3D printing?", options: [{ value: "A", text: "STEP" }, { value: "B", text: "PDF" }, { value: "C", text: "STL" }, { value: "D", text: "IGES" }], answer: "C" },
      { id: "q5", text: "Which drawing sheet orientation is higher than it is wide?", options: [{ value: "A", text: "Landscape" }, { value: "B", text: "Portrait" }, { value: "C", text: "Isometric" }, { value: "D", text: "Auxiliary" }], answer: "B" },
      { id: "q6", text: "Which mate maintains a fixed space between two components?", options: [{ value: "A", text: "Distance" }, { value: "B", text: "Coincident" }, { value: "C", text: "Width" }, { value: "D", text: "Parallel" }], answer: "A" },
      { id: "q7", text: "Which SolidWorks tool is used to check if parts overlap or interfere in an assembly?", options: [{ value: "A", text: "Title block" }, { value: "B", text: "Analysis tools" }, { value: "C", text: "View palette" }, { value: "D", text: "Sheet format" }], answer: "B" },
      { id: "q8", text: "Which mechanical mate is used to simulate the movement of gears?", options: [{ value: "A", text: "Width mate" }, { value: "B", text: "Gear mate" }, { value: "C", text: "Tangent mate" }, { value: "D", text: "Parallel mate" }], answer: "B" },
      { id: "q9", text: "Which type of drawing view shows hidden internal parts by cutting through the model?", options: [{ value: "A", text: "Detail view" }, { value: "B", text: "Auxiliary view" }, { value: "C", text: "Section view" }, { value: "D", text: "Isometric view" }], answer: "C" },
      { id: "q10", text: "Which file format is best for sharing a 3D model with other CAD software?", options: [{ value: "A", text: "PDF" }, { value: "B", text: "STL" }, { value: "C", text: "STEP" }, { value: "D", text: "JPG" }], answer: "C" },
      { id: "q11", text: "A coincident mate makes two surfaces touch each other.", options: [{ value: "TRUE", text: "TRUE" }, { value: "FALSE", text: "FALSE" }], answer: "TRUE" },
      { id: "q12", text: "STL files are mainly used for making 2D drawings.", options: [{ value: "TRUE", text: "TRUE" }, { value: "FALSE", text: "FALSE" }], answer: "FALSE" },
      { id: "q13", text: "The title block includes information like part number and drawing date.", options: [{ value: "TRUE", text: "TRUE" }, { value: "FALSE", text: "FALSE" }], answer: "TRUE" },
      { id: "q14", text: "Landscape orientation means the drawing is taller than it is wide.", options: [{ value: "TRUE", text: "TRUE" }, { value: "FALSE", text: "FALSE" }], answer: "FALSE" },
      { id: "q15", text: "The view palette helps users to insert model views into a drawing.", options: [{ value: "TRUE", text: "TRUE" }, { value: "FALSE", text: "FALSE" }], answer: "TRUE" },
      // Q16 Matching
      {
        id: "q16",
        text: "Match Column A with Column B. Select the correct match from the dropdown for each item.",
        match: [
          {
            a: "Coincident mate",
            bOptions: [
              "1 - STL (3D printing file format)",
              "2 - Symmetric mate",
              "3 - Coincident mate",
              "4 - Portrait orientation",
              "5 - Section view"
            ],
            answer: "3 - Coincident mate"
          },
          {
            a: "STL",
            bOptions: [
              "1 - STL (3D printing file format)",
              "2 - Symmetric mate",
              "3 - Coincident mate",
              "4 - Portrait orientation",
              "5 - Section view"
            ],
            answer: "1 - STL (3D printing file format)"
          },
          {
            a: "Symmetric mate",
            bOptions: [
              "1 - STL (3D printing file format)",
              "2 - Symmetric mate",
              "3 - Coincident mate",
              "4 - Portrait orientation",
              "5 - Section view"
            ],
            answer: "2 - Symmetric mate"
          },
          {
            a: "Portrait orientation",
            bOptions: [
              "1 - STL (3D printing file format)",
              "2 - Symmetric mate",
              "3 - Coincident mate",
              "4 - Portrait orientation",
              "5 - Section view"
            ],
            answer: "4 - Portrait orientation"
          },
          {
            a: "Section view",
            bOptions: [
              "1 - STL (3D printing file format)",
              "2 - Symmetric mate",
              "3 - Coincident mate",
              "4 - Portrait orientation",
              "5 - Section view"
            ],
            answer: "5 - Section view"
          }
        ]
      },
      { id: "q17", text: "STEP format allows CAD models to be shared between different software.", options: [{ value: "VALID", text: "VALID" }, { value: "INVALID", text: "INVALID" }], answer: "VALID" },
      { id: "q18", text: "A gear mate is used for setting up drawing sheet size.", options: [{ value: "VALID", text: "VALID" }, { value: "INVALID", text: "INVALID" }], answer: "INVALID" },
      { id: "q19", text: "The title block contains revision history and author information.", options: [{ value: "VALID", text: "VALID" }, { value: "INVALID", text: "INVALID" }], answer: "VALID" },
      { id: "q20", text: "STL files cannot be used for 3D printing.", options: [{ value: "VALID", text: "VALID" }, { value: "INVALID", text: "INVALID" }], answer: "INVALID" },
      { id: "q21", text: "Detail views are used to enlarge a small part of a drawing.", options: [{ value: "VALID", text: "VALID" }, { value: "INVALID", text: "INVALID" }], answer: "VALID" }
    ];

    function shuffleArray(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    function promptStudentName() {
      let name = "";
      while (!name) {
        name = prompt("Enter your full name for the exam:");
        if (name) {
          STUDENT_NAME = name.trim();
          document.getElementById("student-name").innerText = STUDENT_NAME;
          allowViolationCount = true;
        }
      }
    }

    function buildExam() {
      const container = document.getElementById("exam-container");
      const shuffledQuestions = shuffleArray([...QUESTIONS]);

      shuffledQuestions.forEach((q, index) => {
        const div = document.createElement("div");
        div.className = "question";
        div.innerHTML = `<b>Question ${index + 1}</b>: ${q.text.replace(/\n/g, '<br>')}<br>`;

        if (q.match) {
          // Build formal table for matching
          const table = document.createElement("table");
          const thead = document.createElement("thead");
          thead.innerHTML = `<tr><th>Column A</th><th>Column B (Select)</th></tr>`;
          table.appendChild(thead);
          const tbody = document.createElement("tbody");
          q.match.forEach((item, idx) => {
            const tr = document.createElement("tr");
            const tdA = document.createElement("td");
            tdA.innerText = item.a;
            const tdB = document.createElement("td");
            const select = document.createElement("select");
            select.name = `${q.id}_match_${idx}`;
            select.innerHTML = item.bOptions.map(opt => `<option value="${opt}">${opt}</option>`).join('');
            tdB.appendChild(select);
            tr.appendChild(tdA);
            tr.appendChild(tdB);
            tbody.appendChild(tr);
          });
          table.appendChild(tbody);
          div.appendChild(table);
        } else {
          const shuffledOptions = shuffleArray([...q.options]);
          shuffledOptions.forEach(opt => {
            const label = document.createElement("label");
            label.innerHTML = `<input type="radio" name="${q.id}" value="${opt.value}"> ${opt.text}`;
            div.appendChild(label);
            div.appendChild(document.createElement("br"));
          });
        }
        container.appendChild(div);
      });
    }

    let seconds = EXAM_MINUTES * 60;
    let timerInt;

    function tick() {
      seconds--;
      let m = Math.floor(seconds / 60);
      let s = seconds % 60;
      document.getElementById("timer").innerText = `Time: ${m}:${s.toString().padStart(2, '0')}`;
      if (seconds <= 0) submitExam();
    }

    function fs() { document.documentElement.requestFullscreen?.(); }

    function violation(type) {
      if (!allowViolationCount || !initialLoadComplete) return;
      violations++;
      document.getElementById("warning").innerText = `Violation: ${type} (${violations}/${MAX_VIOLATIONS})`;
      if (violations >= MAX_VIOLATIONS) {
        alert("Too many violations — exam ended");
        submitExam();
      }
    }

    function submitExam() {
      clearInterval(timerInt);
      let score = 0;
      const totalMarks = 40;
      let output = `<h1>Assessment Submitted</h1>`;
      const header = `<div class="header">
          <h2>School: ${SCHOOL}</h2>
          <h2>Module: ${MODULE}</h2>
          <h2>Class: ${CLASS}</h2>
          <h2>Student: ${STUDENT_NAME}</h2>
          <h2>Violations: ${violations}</h2>
          <h2>Max Obtained: TBD/${totalMarks}</h2>
        </div>`;
      output += header;

      QUESTIONS.forEach((q, index) => {
        output += `<div class="question"><b>${q.id.toUpperCase()}</b>: ${q.text.replace(/\n/g, '<br>')}<br>`;
        if (q.match) {
          let qScore = 0;
          q.match.forEach((item, idx) => {
            const sel = document.querySelector(`select[name="${q.id}_match_${idx}"]`);
            const val = sel ? sel.value : "(No Answer)";
            const ok = val === item.answer;
            if (ok) qScore++;
            output += `${item.a}: <span class="${ok ? 'correct' : 'incorrect'}">${val}</span> (Correct: ${item.answer})<br>`;
          });
          score += qScore; // 1 mark per correct match
        } else {
          const sel = document.querySelector(`input[name="${q.id}"]:checked`);
          const val = sel ? sel.value : "(No Answer)";
          const ok = val === q.answer;
          const selText = sel ? q.options.find(o => o.value === val)?.text : "(No Answer)";
          const correctText = q.options.find(o => o.value === q.answer)?.text;
          output += `Your Answer: <span class="${ok ? 'correct' : 'incorrect'}">${val} - ${selText}</span><br>`;
          output += `Correct Answer: <b>${q.answer} - ${correctText}</b><br>`;
          if (ok) score += (index === QUESTIONS.length - 1) ? 1 : 2;
        }
        output += "</div>";
      });

      const penalty = violations * VIOLATION_PENALTY;
      const afterPenalty = Math.max(score - penalty + 2, 0);
      const finalScore = Math.min(afterPenalty, totalMarks);
      output = output.replace("TBD", finalScore);
      output += `<br>Raw Score: ${score}/${totalMarks}<br>Penalty: -${penalty}<br>`;
      output += `<div id="result">Final Score: ${finalScore}/${totalMarks}</div>`;
      output += `<button onclick="downloadPDF()">Download PDF</button>`;
      document.body.innerHTML = output;
    }

    async function downloadPDF() {
      const { jsPDF } = window.jspdf;
      const canvas = await html2canvas(document.body, { scale: 2, backgroundColor: "#eef1f4" });
      const imgData = canvas.toDataURL("image/png");
      const pdf = new jsPDF('p', 'mm', 'a4');
      const pageWidth = pdf.internal.pageSize.getWidth();
      const imgProps = pdf.getImageProperties(imgData);
      const pdfHeight = (imgProps.height * pageWidth) / imgProps.width;
      pdf.addImage(imgData, 'PNG', 0, 0, pageWidth, pdfHeight);
      pdf.save(`${STUDENT_NAME}_Exam_Submission.pdf`);
    }


    function initSecurity() {
      document.addEventListener("visibilitychange", () => { if (document.hidden) violation("TAB_SWITCH"); });
      window.addEventListener("blur", () => violation("WINDOW_BLUR"));
      document.addEventListener("fullscreenchange", () => { if (!document.fullscreenElement) violation("EXIT_FULLSCREEN"); });
      document.addEventListener("keydown", e => {
        if ([123, 116].includes(e.keyCode)) e.preventDefault();
        if (e.ctrlKey && ["t", "n", "w", "i", "u", "r"].includes(e.key.toLowerCase())) {
          e.preventDefault(); violation("SHORTCUT");
        }
      });
      document.addEventListener("contextmenu", e => e.preventDefault());
      window.addEventListener("beforeunload", function (e) {
        if (allowViolationCount && initialLoadComplete) {
          e.preventDefault(); e.returnValue = "";
        }
      });
    }

    window.onload = () => {
      promptStudentName();
      fs();
      buildExam();
      initSecurity();
      timerInt = setInterval(tick, 1000);
      initialLoadComplete = true;
    };
  </script>
  </head>
  <body>

    <div class="exam-wrapper">

      <div class="header">
        <h2>PADRI VJEKO CENTRE TSS</h2>
        <p><strong>Class:</strong> L5-WOT</p>
        <p><strong>Module:</strong> Formative Assessment — SolidWorks</p>
        <p><strong>Student:</strong> <span id="student-name">(Enter
            Name)</span></p>
      </div>

      <div id="timer" class="center-text"></div>
      <div id="warning" class="center-text"></div>

      <div id="exam-container"></div>

      <button onclick="submitExam()">Submit Examination</button>

    </div>

  </body>

</html>
