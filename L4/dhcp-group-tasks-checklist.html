<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DHCP Rubric Assessment System</title>

<!-- Modern Font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>

/* ===============================
   ROOT DESIGN SYSTEM
=================================*/
:root {
    --primary: #6366f1;
    --secondary: #22c55e;
    --accent: #06b6d4;
    --danger: #ef4444;
    --bg1: #0f172a;
    --bg2: #1e293b;
    --card-bg: rgba(255,255,255,0.06);
    --border: rgba(255,255,255,0.12);
}

/* ===============================
   GLOBAL
=================================*/
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, var(--bg1), var(--bg2));
    color: #e5e7eb;
}

/* ===============================
   HEADER
=================================*/
header {
    text-align: center;
    padding: 40px 20px 10px;
}

header h1 {
    margin: 0;
    font-size: 30px;
    font-weight: 700;
}

header h2 {
    margin-top: 8px;
    font-size: 16px;
    font-weight: 400;
    color: var(--accent);
}

/* ===============================
   CONTAINER
=================================*/
.container {
    width: 95%;
    max-width: 1200px;
    margin: 30px auto 60px;
}

/* ===============================
   CARDS (Glass Effect)
=================================*/
.card {
    background: var(--card-bg);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 25px;
    margin-bottom: 25px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.3);
}

.card h3 {
    margin-top: 0;
    font-weight: 600;
    color: var(--primary);
}

/* ===============================
   TABLE
=================================*/
table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 15px;
    overflow: hidden;
    border-radius: 12px;
}

th {
    background: rgba(99,102,241,0.2);
    padding: 10px;
    font-weight: 600;
}

td {
    padding: 10px;
    text-align: center;
    border-bottom: 1px solid var(--border);
}

tr:hover {
    background: rgba(255,255,255,0.04);
}

/* ===============================
   SUMMARY
=================================*/
.summary {
    text-align: center;
    padding: 20px;
    border-radius: 16px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    font-weight: 600;
}

/* ===============================
   BUTTONS
=================================*/
button {
    padding: 10px 18px;
    margin: 6px;
    border: none;
    border-radius: 10px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s ease;
}

button:hover {
    transform: translateY(-2px);
}

.lock { background: var(--secondary); color: #000; }
.reset { background: var(--danger); color: #fff; }
.print { background: var(--primary); color: #fff; }

/* ===============================
   PRINT MODE
=================================*/
@media print {

    body {
        background: #fff;
        color: #000;
    }

    .card {
        background: #fff;
        border: 1px solid #000;
        box-shadow: none;
        backdrop-filter: none;
    }

    button {
        display: none !important;
    }

    * {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
    }
}

</style>
</head>

<body>

<header>
<h1>Windows Server Administration</h1>
<h2>Learning Outcome 3: Deploy DHCP Services</h2>
</header>

<div class="container">

<div class="card">
<h3>Teacher Information</h3>
<input type="text" placeholder="Teacher Name" style="width:100%;padding:8px;">
<br><br>
<input type="date" style="padding:8px;">
</div>

<!-- GROUPS WILL LOAD HERE -->
<div id="groups"></div>

<div class="summary">
Grand Total: <span id="grand">0</span><br>
Percentage: <span id="percent">0%</span>
</div>

<div class="card">
<h3>Teacher Comments</h3>
<textarea style="width:100%;height:80px;"></textarea>
</div>

<div style="text-align:center">
<button onclick="lockMarks()">Lock</button>
<button onclick="resetMarks()">Reset</button>
<button onclick="window.print()">Print</button>
</div>

</div>

<script>

/* ===============================
   CREATE GROUPS WITHOUT document.write
=================================*/

function createGroup(id, title, tasks) {

let html = `
<div class="card">
<h3>${title}</h3>
<table>
<tr>
<th>Task</th>
<th>2</th>
<th>3</th>
<th>4</th>
<th>5</th>
</tr>
`;

tasks.forEach((t, index) => {
html += `
<tr>
<td style="text-align:left">${t}</td>
<td><input type="radio" name="${id}_${index}" value="2" onchange="updateMarks()"></td>
<td><input type="radio" name="${id}_${index}" value="3" onchange="updateMarks()"></td>
<td><input type="radio" name="${id}_${index}" value="4" onchange="updateMarks()"></td>
<td><input type="radio" name="${id}_${index}" value="5" onchange="updateMarks()"></td>
</tr>`;
});

html += `
</table>
<div style="margin-top:10px;font-weight:bold; color: Green;">
Group Total: <span id="${id}-total">0</span>
</div>
</div>
`;

document.getElementById("groups").innerHTML += html;
}

/* ===============================
   LOAD GROUPS
=================================*/

createGroup("g1","Group 1: Introduction to DHCP",[
"Definition of DHCP",
"Importance of DHCP",
"Main DHCP Tasks",
"DORA Process"
]);

createGroup("g2","Group 2: DHCP Installation",[
"DHCP Role Overview",
"Installation Steps",
"Authorization",
"Verification Demo"
]);

createGroup("g3","Group 3: Enable & Authorize DHCP",[
"Enable DHCP Service",
"Explain Authorization",
"Prevent Rogue Servers",
"Practical Demo"
]);

createGroup("g4","Group 4: Scope Configuration",[
"Define Scope",
"Configure IP Range",
"Lease & Exclusion",
"Activate Scope"
]);

createGroup("g5","Group 5: Advanced Scope Settings",[
"Gateway & DNS Setup",
"Reservation (MAC)",
"Lease Management",
"Practical Demo"
]);

createGroup("g6","Group 6: Testing & Troubleshooting",[
"Explain DHCP Basics",
"Client Testing",
"Verify in DHCP Console",
"Troubleshooting"
]);

/* ===============================
   CALCULATIONS
=================================*/

function updateMarks() {

let groups = ["g1","g2","g3","g4","g5","g6"];
let grand = 0;

groups.forEach(g => {

let total = 0;

document.querySelectorAll(`input[name^="${g}_"]:checked`)
.forEach(r => total += parseInt(r.value));

let element = document.getElementById(g+"-total");
if(element) element.innerText = total;

grand += total;

});

document.getElementById("grand").innerText = grand;

let max = 6 * 4 * 5;
document.getElementById("percent").innerText =
((grand/max)*100).toFixed(1) + "%";
}

function lockMarks(){
document.querySelectorAll("input[type=radio]").forEach(r=>r.disabled=true);
}

function resetMarks(){
document.querySelectorAll("input[type=radio]").forEach(r=>{
r.checked=false;
r.disabled=false;
});
updateMarks();
}

</script>

</body>
</html>
