<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1.0'>
<title>L4 Dashboard</title>

<link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css' rel='stylesheet'>
<link href='https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css' rel='stylesheet'>

<style>
:root{
    --primary:#00f5ff;
    --dark-bg:#0f172a;
    --card-bg:rgba(255,255,255,0.05);
    --border-glow:rgba(0,245,255,0.4);
}

body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: radial-gradient(circle at top left,#0f172a,#020617 70%);
    min-height: 100vh;
    padding: 50px 20px;
    color:#e2e8f0;
}

/* MAIN CONTAINER */
.dashboard-card {
    background: var(--card-bg);
    backdrop-filter: blur(18px);
    border-radius: 25px;
    padding: 45px 40px;
    max-width: 1300px;
    margin: 0 auto;
    border:1px solid rgba(255,255,255,0.08);
    box-shadow: 0 0 40px rgba(0,0,0,0.6);
}

/* HEADER */
.dashboard-header {
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:35px;
}

.dashboard-header h1{
    font-weight:800;
    font-size:2.2rem;
    background:linear-gradient(90deg,#00f5ff,#38bdf8);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* PARENT DIRECTORY */
.parent-header{
    background:rgba(255,255,255,0.05);
    border-radius:12px;
    padding:12px 18px;
    margin-bottom:30px;
    border:1px solid rgba(255,255,255,0.08);
}

.parent-header a{
    text-decoration:none;
    color:var(--primary);
    font-weight:600;
    display:flex;
    align-items:center;
    gap:8px;
    transition:0.3s;
}

.parent-header a:hover{
    color:#fff;
}

/* GRID */
.folder-row {
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(230px,1fr));
    gap:25px;
}

/* FOLDER CARD */
.folder-card {
    text-decoration:none;
    background:rgba(255,255,255,0.04);
    border-radius:18px;
    padding:28px 20px;
    text-align:center;
    color:#e2e8f0;
    transition:all 0.35s ease;
    border:1px solid transparent;
    position:relative;
    overflow:hidden;
}

.folder-card::before{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(120deg,transparent,rgba(0,245,255,0.15),transparent);
    transform:translateX(-100%);
    transition:0.6s;
}

.folder-card:hover::before{
    transform:translateX(100%);
}

.folder-card:hover{
    transform:translateY(-10px) scale(1.02);
    border:1px solid var(--border-glow);
    box-shadow:0 0 25px var(--border-glow);
}

.folder-card i{
    font-size:55px;
    margin-bottom:14px;
    color:var(--primary);
}

.folder-title{
    font-weight:700;
    font-size:1.1rem;
}

.folder-meta{
    font-size:0.85rem;
    opacity:0.7;
    margin-top:4px;
}

/* RESPONSIVE */
@media(max-width:576px){
    .dashboard-card{
        padding:30px 20px;
    }
}
</style>
</head>

<body>

<div class='dashboard-card'>

    <div class='dashboard-header'>
        <h1>L4 Module Dashboard</h1>
    </div>

    <div class='parent-header'>
        <a href='../'>
            <i class='bi bi-arrow-left-circle-fill'></i> Parent Directory
        </a>
    </div>

    <div class='folder-row'>

        <a href='CCMCS401/' class='folder-card'>
            <i class='bi bi-folder-fill'></i>
            <div class='folder-title'>CCMCS401</div>
        </a>

        <a href='NITWA401/' class='folder-card'>
            <i class='bi bi-folder-fill'></i>
            <div class='folder-title'>NITWA401</div>
        </a>

        <!-- NEW FILE LINK -->
        <a href='dhcp-group-tasks.html' class='folder-card'>
            <i class='bi bi-diagram-3-fill'></i>
            <div class='folder-title'>DHCP Group Tasks</div>
            <div class='folder-meta'>Interactive Presentation Cards</div>
        </a>

    </div>

</div>

</body>
</html>
