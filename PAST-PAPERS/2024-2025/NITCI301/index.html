<!DOCTYPE html>
<html lang="en">
<head>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUESTION PAPERS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: radial-gradient(circle at 50% 0%, #1e293b 0%, #0f172a 100%);
            --bg-card: rgba(30, 41, 59, 0.7);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-glow: #38bdf8;
            --accent-linux: #fb923c;
            --accent-windows: #4ade80;
            --accent-python: #c084fc;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        .portal-wrapper {
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 1200px;
            border: 1px solid var(--border-color);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 35px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 25px;
        }
        .portal-header h1 {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            background: linear-gradient(to right, #ffffff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
        }
        .text-subtitle { color: var(--text-muted); font-size: 1rem; font-weight: 400; }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            text-decoration: none;
            padding: 10px 18px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background: rgba(255, 255, 255, 0.03);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .back-link:hover {
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateX(-3px);
        }
        .file-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
        .file-card {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: space-between;
            background: rgba(15, 23, 42, 0.4);
            border-radius: 18px;
            padding: 24px;
            border: 1px solid var(--border-color);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
            color: var(--text-main);
            min-height: 175px;
            position: relative;
            overflow: hidden;
        }
        .file-card { --local-accent: var(--accent-glow); }
        .file-card.linux-theme { --local-accent: var(--accent-linux); }
        .file-card.windows-theme { --local-accent: var(--accent-windows); }
        .file-card.python-theme { --local-accent: var(--accent-python); }
        .file-icon-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 48px;
            height: 48px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            color: var(--local-accent);
            font-size: 1.4rem;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }
        .file-info { width: 100%; display: flex; justify-content: space-between; align-items: flex-end; margin-top: 20px; }
        .file-title { font-size: 1.05rem; font-weight: 700; line-height: 1.4; letter-spacing: -0.01em; margin-bottom: 4px; }
        .file-meta { font-size: 0.8rem; color: var(--text-muted); }
        .arrow-icon { font-size: 1.1rem; color: var(--text-muted); opacity: 0; transform: translateX(-6px); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .file-card:hover { border-color: rgba(255, 255, 255, 0.15); transform: translateY(-5px); background: rgba(255, 255, 255, 0.02); }
        .file-card:hover .file-icon-wrapper { background: var(--local-accent); color: #0f172a; transform: scale(1.05); }
        .file-card:hover .arrow-icon { opacity: 1; color: var(--local-accent); transform: translateX(0); }
        @media (max-width: 1100px) { .file-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 768px) { .file-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 576px) { .file-grid { grid-template-columns: 1fr; } .top-nav { flex-direction: column; align-items: flex-start; gap: 16px; } .back-link { width: 100%; justify-content: center; } }
    </style>

</head>
<body>
    <div class="portal-wrapper">
        <div class="top-nav">
            <div class="portal-header">
                <h1>NITCI301</h1>
                <div class="text-subtitle">Select a subject module or resources directory</div>
            </div>
            <a href="../" class="back-link">
                <i class="bi bi-arrow-left"></i> Parent Directory
            </a>
        </div>
        <div class="file-grid">
            
            <a href="NITCI301 - MK-GUIDE.docx" class="file-card ">
                <div class="file-icon-wrapper">
                    <i class="bi bi-folder-fill"></i>
                </div>
                <div class="file-info">
                    <div>
                        <div class="file-title">NITCI301 - MK-GUIDE</div>
                        <div class="file-meta">Files: 136</div>
                    </div>
                    <i class="bi bi-arrow-right arrow-icon"></i>
                </div>
            </a>
            <a href="NITCI301- QP.docx" class="file-card ">
                <div class="file-icon-wrapper">
                    <i class="bi bi-folder-fill"></i>
                </div>
                <div class="file-info">
                    <div>
                        <div class="file-title">NITCI301- QP</div>
                        <div class="file-meta">Files: 133</div>
                    </div>
                    <i class="bi bi-arrow-right arrow-icon"></i>
                </div>
            </a>
        </div>
    </div>
</body>
</html>
