<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Academic Resources Portal</title>

    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/3135/3135755.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        :root {
            --bg-gradient: radial-gradient(circle at 50% 0%, #1e293b 0%, #0f172a 100%);
            --bg-card: rgba(30, 41, 59, 0.7);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-glow: #38bdf8;
            --card-hover-bg: rgba(56, 189, 248, 0.04);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Premium Dashboard Container */
        .portal-wrapper {
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 850px;
            border: 1px solid var(--border-color);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Elegant Top Navigation */
        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background: rgba(255, 255, 255, 0.03);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .back-link:hover {
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateX(-3px);
        }

        /* Modern Header Setup */
        .portal-header h1 {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            background: linear-gradient(to right, #ffffff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
        }

        .text-subtitle {
            color: var(--text-muted);
            font-size: 1rem;
            font-weight: 400;
        }

        /* Clean 2-Column Grid Layout */
        .resource-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        /* Luxury Folder Cards */
        .folder-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(15, 23, 42, 0.4);
            border-radius: 18px;
            padding: 24px 28px;
            border: 1px solid var(--border-color);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
            color: var(--text-main);
            position: relative;
            overflow: hidden;
        }

        .folder-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(56, 189, 248, 0.05) 0%, transparent 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .card-left {
            display: flex;
            align-items: center;
            gap: 20px;
            z-index: 1;
        }

        /* Folder Icon Styling */
        .folder-icon-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 52px;
            height: 52px;
            background: rgba(56, 189, 248, 0.08);
            border-radius: 14px;
            color: var(--accent-glow);
            font-size: 1.6rem;
            transition: all 0.3s ease;
        }

        .folder-info {
            display: flex;
            flex-direction: column;
        }

        .folder-title {
            font-size: 1.15rem;
            font-weight: 600;
            letter-spacing: -0.01em;
            margin-bottom: 2px;
        }

        .folder-meta {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* Action Arrow Icon */
        .arrow-icon {
            font-size: 1.2rem;
            color: var(--text-muted);
            opacity: 0.4;
            transform: translateX(-5px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1;
        }

        /* Interactive Card States */
        .folder-card:hover {
            border-color: rgba(56, 189, 248, 0.4);
            transform: translateY(-4px);
            box-shadow: 0 12px 30px -10px rgba(56, 189, 248, 0.2);
            background: var(--card-hover-bg);
        }

        .folder-card:hover::before {
            opacity: 1;
        }

        .folder-card:hover .folder-icon-wrapper {
            background: var(--accent-glow);
            color: #0f172a;
            transform: scale(1.05);
        }

        .folder-card:hover .arrow-icon {
            opacity: 1;
            color: var(--accent-glow);
            transform: translateX(0);
        }

        /* Responsive Breakpoints */
        @media (max-width: 640px) {
            .portal-wrapper {
                padding: 24px;
            }
            .resource-grid {
                grid-template-columns: 1fr;
                gap: 16px;
            }
            .portal-header h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>

<body>

    <div class="portal-wrapper">

        <div class="top-nav">
            <div class="portal-header">
                <h1>Academic Resources Portal</h1>
                <div class="text-subtitle">Select an Academic Year to browse files</div>
            </div>
            <a href="../" class="back-link">
                <i class="bi bi-arrow-left"></i> Parent
            </a>
        </div>

        <div class="resource-grid">

            <a href="2024-2025/" class="folder-card">
                <div class="card-left">
                    <div class="folder-icon-wrapper">
                        <i class="bi bi-folder-fill"></i>
                    </div>
                    <div class="folder-info">
                        <span class="folder-title">2024-2025</span>
                        <span class="folder-meta">Academic Repository</span>
                    </div>
                </div>
                <i class="bi bi-arrow-right arrow-icon"></i>
            </a>

            <a href="2025-2026/" class="folder-card">
                <div class="card-left">
                    <div class="folder-icon-wrapper">
                        <i class="bi bi-folder-fill"></i>
                    </div>
                    <div class="folder-info">
                        <span class="folder-title">2025-2026</span>
                        <span class="folder-meta">Academic Repository</span>
                    </div>
                </div>
                <i class="bi bi-arrow-right arrow-icon"></i>
            </a>

        </div>
    </div>

</body>

</html>
