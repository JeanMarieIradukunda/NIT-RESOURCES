<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NITVI301 Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            font-family: 'Segoe UI', system-ui;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            min-height: 100vh;
            padding: 40px;
            color: white;
        }

        /* Dashboard container */

        .dashboard {
            max-width: 1200px;
            margin: auto;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(14px);
            border-radius: 20px;
            padding: 35px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        /* Header */

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .dashboard-title {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .dashboard-title i {
            color: #60a5fa;
            margin-right: 8px;
        }

        /* Navigation */

        .nav-link {
            color: #cbd5f5;
            font-weight: 500;
        }

        .nav-link:hover {
            color: white;
        }

        /* Grid */

        .file-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 25px;
        }

        /* File cards */

        .file-card {
            text-decoration: none;
            padding: 28px 22px;
            border-radius: 18px;
            color: white;
            position: relative;
            transition: all .25s ease;
            overflow: hidden;
        }

        .file-card:hover {
            transform: translateY(-8px) scale(1.03);
            box-shadow: 0 15px 30px rgba(0, 0, 0, .5);
        }

        /* Icons */

        .file-icon {
            font-size: 50px;
            margin-bottom: 12px;
        }

        /* Titles */

        .file-title {
            font-weight: 700;
            font-size: 1.05rem;
        }

        .file-meta {
            font-size: .85rem;
            opacity: .9;
        }

        /* File badges */

        .badge-file {
            position: absolute;
            top: 12px;
            right: 12px;
            font-size: .65rem;
            padding: 4px 7px;
            border-radius: 8px;
            background: rgba(255, 255, 255, .25);
        }

        /* Colors */

        .docx {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
        }

        .pdf {
            background: linear-gradient(135deg, #dc2626, #991b1b);
        }

        .html {
            background: linear-gradient(135deg, #16a34a, #166534);
        }

        .resource {
            background: linear-gradient(135deg, #9333ea, #6b21a8);
        }

        /* Responsive */

        @media(max-width:992px) {
            .file-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media(max-width:576px) {
            .file-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <div class="dashboard">

        <div class="dashboard-header">

            <div class="dashboard-title">
                <i class="bi bi-grid-fill"></i> NITVI301 Dashboard
            </div>

            <a href="../" class="btn btn-light btn-sm">
                <i class="bi bi-arrow-left-circle"></i> Parent Directory
            </a>

        </div>

        <div class="file-grid">

            <a href="Handout.docx" class="file-card docx">
                <span class="badge-file">DOCX</span>
                <div class="file-icon"><i class="bi bi-file-earmark-word-fill"></i></div>
                <div class="file-title">Handout</div>
                <!-- <div class="file-meta">9.6 MB</div> -->
            </a>

            <a href="Handout.pdf" class="file-card pdf">
                <span class="badge-file">PDF</span>
                <div class="file-icon"><i class="bi bi-file-earmark-pdf-fill"></i></div>
                <div class="file-title">Handout</div>
                <!-- <div class="file-meta">1.3 MB</div> -->
            </a>

            <a href="L-O-1-Assessment-One.html" class="file-card html">
                <span class="badge-file">HTML</span>
                <div class="file-icon"><i class="bi bi-file-earmark-code-fill"></i></div>
                <div class="file-title">Assessment One</div>
                <!-- <div class="file-meta">5 KB</div> -->
            </a>

            <a href="voip_lo2.html" class="file-card resource">
                <span class="badge-file">HTML</span>
                <div class="file-icon"><i class="bi bi-diagram-3-fill"></i></div>
                <div class="file-title">VOIP LO2</div>
                <!-- <div class="file-meta">4 KB</div> -->
            </a>

            <a href="voip_lo3_configure_voip_system.html" class="file-card resource">
                <span class="badge-file">HTML</span>
                <div class="file-icon"><i class="bi bi-gear-fill"></i></div>
                <div class="file-title">Configure VOIP System</div>
                <!-- <div class="file-meta">5 KB</div> -->
            </a>

        </div>

    </div>

</body>

</html>
