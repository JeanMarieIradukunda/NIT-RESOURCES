<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Academic Dashboard | PADRI VJEKO</title>

<link rel="icon" href="https://cdn-icons-png.flaticon.com/512/3135/3135755.png">

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Roboto+Flex:wght@300;400;600;800&display=swap" rel="stylesheet">

<!-- Bootstrap + Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

<style>
:root{
    --blue:#e81ab1;
    --green:#0f9d58;
    --yellow:#f9ab00;
    --purple:#a142f4;
    --bg1:#0b1020;
    --bg2:#111a33;
    --glass:rgba(255,255,255,0.08);
    --text:#ffffff;
    --muted:rgba(255,255,255,0.7);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,Roboto Flex,sans-serif;
}

body{
    color:var(--text);
    overflow-x:hidden;
    background: radial-gradient(circle at top, #1a73e8 0%, transparent 40%),
                radial-gradient(circle at bottom, #42c2f4 0%, transparent 50%),
                linear-gradient(180deg,var(--bg1),var(--bg2));
}

/* ===== ANIMATED SPACE BACKGROUND ===== */
.stars{
    position:fixed;
    width:100%;
    height:100%;
    background:transparent;
    z-index:-1;
}
.stars::before,
.stars::after{
    content:"";
    position:absolute;
    width:200%;
    height:200%;
    background:transparent url('https://www.transparenttextures.com/patterns/stardust.png');
    animation:moveStars 120s linear infinite;
    opacity:0.3;
}
@keyframes moveStars{
    from{transform:translate(0,0);}
    to{transform:translate(-500px,-500px);}
}

/* ===== TOP BAR ===== */
.topbar{
    position:sticky;
    top:0;
    z-index:10;
    backdrop-filter:blur(18px);
    background:rgba(10,15,30,0.6);
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:14px 22px;
    border-bottom:1px solid rgba(255,255,255,0.1);
}

.brand{
    display:flex;
    align-items:center;
    gap:10px;
    font-weight:700;
    letter-spacing:0.5px;
}

.brand img{
    width:34px;
    filter:drop-shadow(0 0 6px rgba(26,115,232,0.6));
}

.search{
    flex:1;
    max-width:520px;
    margin:0 20px;
    position:relative;
}

.search input{
    width:100%;
    padding:12px 42px;
    border-radius:30px;
    border:1px solid rgba(255,255,255,0.2);
    outline:none;
    background:rgba(255,255,255,0.08);
    color:white;
    backdrop-filter:blur(10px);
    transition:.3s;
}

.search input:focus{
    box-shadow:0 0 0 3px rgba(26,115,232,0.4);
    background:rgba(255,255,255,0.12);
}

.search i{
    position:absolute;
    left:14px;
    top:50%;
    transform:translateY(-50%);
    color:var(--muted);
}

/* ===== HEADER ===== */
.header{
    text-align:center;
    padding:60px 20px 20px;
}

.header h1{
    font-size:2.8rem;
    font-weight:800;
    background:linear-gradient(90deg,#1a9ce8,#f4aa42,#0f9d58);
    background-clip:text;
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    animation:floatTitle 6s ease-in-out infinite;
}

@keyframes floatTitle{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-6px);}
}

.header p{
    color:var(--muted);
    margin-top:8px;
}

/* ===== CHIPS ===== */
.chips{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:10px;
    margin-top:18px;
}

.chip{
    background:var(--glass);
    padding:10px 14px;
    border-radius:30px;
    font-size:13px;
    border:1px solid rgba(255,255,255,0.1);
    backdrop-filter:blur(10px);
}

/* ===== GRID ===== */
.grid{
    max-width:1100px;
    margin:40px auto;
    padding:0 20px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

/* ===== CARD ===== */
.card-link{
    text-decoration:none;
}

.card{
    background:var(--glass);
    border-radius:18px;
    padding:26px;
    text-align:center;
    border:1px solid rgba(255,255,255,0.15);
    backdrop-filter:blur(18px);
    transition:all .35s ease;
    position:relative;
    overflow:hidden;
}

.card::before{
    content:"";
    position:absolute;
    inset:-2px;
    background:linear-gradient(45deg,transparent,#1a73e8,#a142f4,transparent);
    opacity:0;
    transition:0.5s;
}

.card:hover::before{
    opacity:1;
    animation:glow 2s linear infinite;
}

@keyframes glow{
    0%{filter:hue-rotate(0deg);}
    100%{filter:hue-rotate(360deg);}
}

.card:hover{
    transform:translateY(-10px) scale(1.02);
}

.icon{
    font-size:44px;
    margin-bottom:10px;
}

.title{
    font-weight:700;
}

.subtitle{
    font-size:13px;
    color:var(--muted);
}

/* COLORS */
.blue{color:var(--blue)}
.green{color:var(--green)}
.yellow{color:var(--yellow)}
.purple{color:var(--purple)}

/* EMPTY */
.empty{
    text-align:center;
    color:var(--muted);
    display:none;
    margin-top:30px;
}

/* floating particles */
.particle{
    position:absolute;
    width:6px;
    height:6px;
    background:white;
    border-radius:50%;
    opacity:0.3;
    animation:float 10s infinite linear;
}

@keyframes float{
    from{transform:translateY(0);}
    to{transform:translateY(-1000px);}
}

/* responsive */
@media(max-width:600px){
    .header h1{font-size:2rem;}
}
</style>
</head>

<body>

<div class="stars"></div>

<!-- TOP BAR -->
<div class="topbar">
    <div class="brand">
        <img src="https://cdn-icons-png.flaticon.com/512/3135/3135755.png">
        PADRI VJEKO CENTRE TSS
    </div>

    <div>
        <i class="bi bi-grid-3x3-gap"></i>
    </div>
</div>

<!-- HEADER -->
<div class="header">
    <h1>Academic Dashboard</h1>
    <p>NIT – Networking & Internet Technology</p>

    <div class="chips">
        <div class="chip"><i class="bi bi-person"></i> Instructor: Juaen Marie</div>
        <div class="chip"><i class="bi bi-calendar"></i> 2026 Academic Year</div>
        <div class="chip"><i class="bi bi-geo-alt"></i> PADRI VJEKO CENTRE</div>
    </div>
</div>

<!-- GRID -->
<div class="grid" id="grid">

    <a class="card-link" href="1-TERM-EXAMS/">
        <div class="card" data-name="term exams">
            <div class="icon yellow"><i class="bi bi-journal-text"></i></div>
            <div class="title">Term Exams</div>
            <div class="subtitle">Assessments & Tests</div>
        </div>
    </a>

    <a class="card-link" href="L3-NIT/">
        <div class="card" data-name="level 3 nit">
            <div class="icon blue"><i class="bi bi-mortarboard-fill"></i></div>
            <div class="title">Level 3 NIT</div>
            <div class="subtitle">Courses & Materials</div>
        </div>
    </a>

    <a class="card-link" href="L4/">
        <div class="card" data-name="level 4">
            <div class="icon green"><i class="bi bi-layers-fill"></i></div>
            <div class="title">Level 4 NIT</div>
            <div class="subtitle">Class Resources</div>
        </div>
    </a>

    <a class="card-link" href="L5-NIT/">
        <div class="card" data-name="level 5 nit">
            <div class="icon purple"><i class="bi bi-collection-fill"></i></div>
            <div class="title">Level 5 NIT</div>
            <div class="subtitle">Advanced Materials</div>
        </div>
    </a>

</div>

<div class="empty" id="empty">
    <i class="bi bi-search" style="font-size:30px;"></i>
    <p>No results found</p>
</div>

<script>
const search=document.getElementById("search");
const cards=document.querySelectorAll(".card");
const empty=document.getElementById("empty");

search.addEventListener("input", () => {
    let q = search.value.toLowerCase().trim();
    let count = 0;

    cards.forEach(card => {
        const parent = card.parentElement;

        // 🔍 Extract ALL searchable content
        const title = card.querySelector(".title")?.innerText.toLowerCase() || "";
        const subtitle = card.querySelector(".subtitle")?.innerText.toLowerCase() || "";
        const dataset = card.dataset.name?.toLowerCase() || "";
        const link = parent.getAttribute("href")?.toLowerCase() || "";

        // 🔥 combine everything into one searchable string
        const fullText = `${title} ${subtitle} ${dataset} ${link}`;

        // smarter match (deep search)
        const match = fullText.includes(q);

        parent.style.display = match ? "block" : "none";

        if (match) count++;
    });

    empty.style.display = count ? "none" : "block";
});

/* floating particles */
for(let i=0;i<25;i++){
    let p=document.createElement("div");
    p.className="particle";
    p.style.left=Math.random()*100+"vw";
    p.style.top=Math.random()*100+"vh";
    p.style.animationDuration=(5+Math.random()*10)+"s";
    document.body.appendChild(p);
}
</script>

</body>
</html>
